<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Academia de Física CECYT 1 – Materiales, horarios y recursos para Física I y Física II">
  <meta name="theme-color" content="#1a4d8c">
  <title>Academia de Física – CECYT 1</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════
       HEADER
  ══════════════════════════════════════════════════════════ -->
  <header class="site-header" role="banner">
    <button
      class="hamburger"
      id="menuToggle"
      aria-label="Abrir menú de navegación"
      aria-expanded="false"
      aria-controls="sidebarNav">
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </button>

    <div class="header-brand">
      <div class="header-logo" aria-hidden="true">⚛</div>
      <div class="header-titles">
        <h1 id="site-title">Academia de Física</h1>
        <p  id="site-subtitle">CECYT 1 · Turno Matutino</p>
      </div>
    </div>
  </header>

  <!-- Overlay para cerrar menú en móvil -->
  <div class="overlay" id="overlay" aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════════════════════
       LAYOUT PRINCIPAL
  ══════════════════════════════════════════════════════════ -->
  <div class="layout">

    <!-- ── NAV LATERAL IZQUIERDO ─────────────────────────── -->
    <nav
      class="sidebar-nav"
      id="sidebarNav"
      role="navigation"
      aria-label="Navegación principal">
      <ul id="navList" role="list"></ul>
    </nav>

    <!-- ── CONTENIDO CENTRAL ─────────────────────────────── -->
    <main
      class="main-content"
      id="mainContent"
      role="main"
      tabindex="-1"
      aria-live="polite"
      aria-atomic="false">
      <div class="loading" id="loadingIndicator">
        <div class="loading-spinner" aria-hidden="true"></div>
        <p>Cargando contenido…</p>
      </div>
    </main>

    <!-- ── SIDEBAR DERECHO (WIDGETS) ─────────────────────── -->
    <aside
      class="sidebar-widgets"
      id="sidebarWidgets"
      role="complementary"
      aria-label="Avisos, noticias y eventos">
    </aside>

  </div><!-- /.layout -->

  <!-- ═══════════════════════════════════════════════════════
       FOOTER
  ══════════════════════════════════════════════════════════ -->
  <footer class="site-footer" role="contentinfo">
    <p>
      <span id="site-footer-title">Academia de Física</span>
      &middot; CECYT 1
      &middot; <span id="currentYear"></span>
    </p>
    <p class="footer-sub">Sitio de uso educativo interno</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
